name: Docker Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-backend ./Task.Manager/Task.Manager

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-backend

      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-frontend ./frontend

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-frontend